<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJK Property Magazine - Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .lang-ur { font-family: 'Noto Nastaliq Urdu', serif; line-height: 2.5; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-all duration-300">

  <header class="bg-gradient-to-r bg-blue-700 to-indigo-800 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center flex-wrap gap-3">
      <div class="flex items-center space-x-3">
        <span class="font-bold text-xl tracking-wide data-translate" data-en="NJK Property Magazine" data-ur="این جے کے پراپرٹی میگزین">NJK Property Magazine</span>
      </div>
      <div class="flex items-center space-x-4">
        <button id="langToggleBtn" class="bg-white/20 hover:bg-white/30 text-white font-medium py-1.5 px-4 rounded-lg transition text-sm cursor-pointer border border-white/10 shadow-sm">
          اردو / English
        </button>
        <span id="userSessionBadge" class="hidden text-xs bg-indigo-900/40 px-3 py-1.5 rounded-md border border-indigo-400/20 font-mono"></span>
        <button id="logoutBtn" class="hidden bg-rose-600 hover:bg-rose-700 text-white font-semibold py-1.5 px-4 rounded-lg transition text-sm cursor-pointer shadow-md data-translate" data-en="Log Out" data-ur="لاگ آؤٹ">Log Out</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div id="alertBox" class="hidden mb-6 p-4 rounded-xl border transition-all shadow-md transform scale-95 duration-200"></div>

    <section id="authView" class="max-w-md mx-auto bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden transition-all duration-300 mt-10">
      <div class="bg-slate-100 p-4 flex justify-around border-b border-slate-200/60">
        <button id="switchLoginTab" class="w-1/2 py-2 text-center font-bold text-blue-700 border-b-2 border-blue-600 data-translate" data-en="Sign In" data-ur="لاگ ان">Sign In</button>
        <button id="switchRegisterTab" class="w-1/2 py-2 text-center font-semibold text-slate-500 hover:text-slate-800 data-translate" data-en="Create Account" data-ur="رجسٹریشن">Create Account</button>
      </div>
      <div class="p-8">
        <form id="authForm" class="space-y-5">
          <div id="nameFieldGroup" class="hidden">
            <label class="block text-sm font-semibold mb-1 text-slate-600 data-translate" data-en="Full Name" data-ur="مکمل نام">Full Name</label>
            <input type="text" id="authName" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50">
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1 text-slate-600 data-translate" data-en="Email Address" data-ur="ای میل ایڈریس">Email Address</label>
            <input type="email" id="authEmail" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50" placeholder="agent@njkmagazine.com">
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1 text-slate-600 data-translate" data-en="Password" data-ur="پاس ورڈ">Password</label>
            <input type="password" id="authPassword" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50" placeholder="••••••••">
          </div>
          <button type="submit" id="authSubmitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition transform active:scale-95 cursor-pointer mt-2 data-translate" data-en="Authenticate System Access" data-ur="سسٹم تک رسائی حاصل کریں">Authenticate System Access</button>
        </form>
      </div>
    </section>

    <section id="dashboardView" class="hidden space-y-8 animate-fadeIn">
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center space-x-4">
          <div class="p-3.5 bg-blue-50 rounded-xl text-blue-600 text-2xl font-bold">P</div>
          <div>
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 data-translate" data-en="Available Listing Quota" data-ur="دستیاب لسٹنگ کوٹہ">Available Listing Quota</p>
            <h3 id="quotaPostVal" class="text-3xl font-bold text-slate-800">0</h3>
          </div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center space-x-4">
          <div class="p-3.5 bg-indigo-50 rounded-xl text-indigo-600 text-2xl font-bold">R</div>
          <div>
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 data-translate" data-en="Refresh Token Points" data-ur="ریفریش ٹوکن پوائنٹس">Refresh Token Points</p>
            <h3 id="quotaRefreshVal" class="text-3xl font-bold text-slate-800">0</h3>
          </div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center space-x-4">
          <div class="p-3.5 bg-slate-50 rounded-xl text-slate-600 text-2xl font-bold">R</div>
          <div>
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 data-translate" data-en="Account Role Context" data-ur="اکاؤنٹ کا درجہ">Account Role Context</p>
            <h3 id="accountRoleVal" class="text-2xl font-bold text-blue-600">Agent</h3>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-5 h-fit lg:col-span-1">
          <h2 class="text-xl font-bold border-b pb-3 text-slate-700 data-translate" data-en="NJK Property Form" data-ur="فارم برائے این جے کے پراپرٹی">NJK Property Form</h2>
          
          <form id="propertyForm" class="space-y-4">
            <div>
              <label for="title" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Title" data-ur="عنوان">Title</label>
              <input type="text" id="title" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div>
              <label for="description" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Description" data-ur="تفصیل">Description</label>
              <textarea id="description" rows="3" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
            </div>

            <div>
              <label for="propertyType" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Property Type" data-ur="پراپرٹی کی قسم">Property Type</label>
              <select id="propertyType" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="" disabled selected class="data-translate" data-en="Select Property Type" data-ur="پراپرٹی کی قسم منتخب کریں">Select Property Type</option>
                <option value="Plot">Plot</option>
                <option value="Bungalow">Bungalow</option>
                <option value="Flat">Flat</option>
                <option value="Shop">Shop</option>
                <option value="Office">Office</option>
                <option value="Mezzanine">Mezzanine</option>
                <option value="Basement">Basement</option>
                <option value="Building">Building</option>
                <option value="Factory">Factory</option>
                <option value="Warehouse">Warehouse</option>
              </select>
            </div>

            <div>
              <label for="location" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Location" data-ur="مقام / لوکیشن">Location</label>
              <select id="location" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="" disabled selected class="data-translate" data-en="Select Location" data-ur="لوکیشن منتخب کریں">Select Location</option>
                <option value="DHA Phase">DHA Phase</option>
                <option value="Clifton Block">Clifton Block</option>
                <option value="Bahria Town Karachi">Bahria Town Karachi</option>
                <option value="DHA City Karachi">DHA City Karachi</option>
                <option value="Korangi Industrial Area">Korangi Industrial Area</option>
                <option value="Creek Industrial Area">Creek Industrial Area</option>
                <option value="Landhi Industrial Area">Landhi Industrial Area</option>
                <option value="Port Qasim">Port Qasim</option>
                <option value="National Highway">National Highway</option>
                <option value="Superhighway">Superhighway</option>
                <option value="Nooriabad">Nooriabad</option>
                <option value="Site">Site</option>
                <option value="Site Superhighway Phase">Site Superhighway Phase</option>
                <option value="Custom Location">Custom Location</option>
              </select>
            </div>

            <div id="locationDetailContainer" class="hidden">
              <label id="locationDetailLabel" for="locationDetail" class="block text-sm font-medium mb-1 text-gray-700">Location Detail</label>
              <input type="text" id="locationDetail" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div>
              <label for="purpose" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Purpose" data-ur="مقصد">Purpose</label>
              <select id="purpose" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="" disabled selected class="data-translate" data-en="Select Purpose" data-ur="مقصد منتخب کریں">Select Purpose</option>
                <option value="Sale">Sale</option>
                <option value="Rent">Rent</option>
              </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Area Value" data-ur="رقبے کی ویلیو">Area Value</label>
                <input type="number" id="areaValue" required min="0" step="any" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
              </div>
              <div>
                <label class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Unit" data-ur="یونٹ">Unit</label>
                <select id="areaUnit" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                  <option value="Sqft">Sqft</option>
                  <option value="Sqyds">Sqyds</option>
                  <option value="Acre">Acre</option>
                </select>
              </div>
            </div>

            <div id="bedroomsContainer" class="hidden">
              <label for="bedrooms" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Bedrooms" data-ur="کمرے">Bedrooms</label>
              <input type="number" id="bedrooms" min="0" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div id="bathroomsContainer" class="hidden">
              <label for="bathrooms" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Bathrooms" data-ur="باتھ رومز">Bathrooms</label>
              <input type="number" id="bathrooms" min="0" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div>
              <label for="price" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Price (PKR)" data-ur="قیمت (روپے)">Price (PKR)</label>
              <input type="number" id="price" required min="0" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div>
              <label for="agentName" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Agent Name" data-ur="ایجنٹ کا نام">Agent Name</label>
              <input type="text" id="agentName" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div>
              <label for="agencyName" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Agency Name" data-ur="ایجنسی کا نام">Agency Name</label>
              <input type="text" id="agencyName" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div>
              <label for="contactNumber" class="block text-sm font-medium mb-1 text-gray-700 data-translate" data-en="Contact Number" data-ur="رابطہ نمبر">Contact Number</label>
              <input type="number" id="contactNumber" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>

            <div class="pt-2">
              <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-3 rounded-lg transition duration-200 cursor-pointer data-translate" data-en="Submit Property" data-ur="پراپرٹی جمع کریں">
                Submit Property
              </button>
            </div>
          </form>
        </div>

        <div class="lg:col-span-2 space-y-6">
          <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-lg font-bold border-b pb-3 mb-4 text-slate-700 data-translate" data-en="Active Catalog Assets Management" data-ur="آپ کی لسٹنگز کا انتظام">Active Catalog Assets Management</h2>
            <div id="postsContainer" class="space-y-4 max-h-[650px] overflow-y-auto pr-2">
              </div>
          </div>
        </div>

      </div>
    </section>

  </main>

  <footer class="bg-slate-900 text-slate-400 py-6 mt-16 border-t border-slate-800 text-center text-xs tracking-wider">
    <p class="font-mono uppercase">&copy; 2026 REAL ESTATE RECORD SYSTEM AUTOMATION PIPELINE</p>
    <p class="text-slate-500 mt-1 font-semibold">A PROJECT BY HNK & SHEEKAN TECH AND STUDIO</p>
  </footer>

  <script>
    // CORE SCRIPT LINK REGISTRY GATEWAY VALUE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQOEpgXnlwPoR8ZJBDQ5HSgOonDa8mqwz5U9LWv80oi3FcJHeAngGdHj10FE2RAQwzBw/exec";

    let sysState = {
      currentLang: "en",
      activeTab: "login",
      token: localStorage.getItem("z_system_auth_token") || null,
      profile: null,
      listings: []
    };

    const uiDictionary = {
      "en": { dir: "ltr" },
      "ur": { dir: "rtl" }
    };

    document.addEventListener("DOMContentLoaded", () => {
      initEventListeners();
      evaluateGlobalApplicationStateRoute();
      initNJKFormConditionalLogic();
    });

    function initEventListeners() {
      document.getElementById("langToggleBtn").addEventListener("click", () => {
        sysState.currentLang = sysState.currentLang === "en" ? "ur" : "en";
        document.documentElement.lang = sysState.currentLang;
        document.documentElement.dir = uiDictionary[sysState.currentLang].dir;
        if (sysState.currentLang === "ur") {
          document.body.classList.add("lang-ur");
        } else {
          document.body.classList.remove("lang-ur");
        }
        applyUIPhraseTranslationSync();
      });

      document.getElementById("switchLoginTab").addEventListener("click", () => toggleAuthTabs("login"));
      document.getElementById("switchRegisterTab").addEventListener("click", () => toggleAuthTabs("register"));
      document.getElementById("authForm").addEventListener("submit", handleAuthenticationFormTransactionPipeline);
      document.getElementById("propertyForm").addEventListener("submit", handleListingCreationPipelineCommit);
      document.getElementById("logoutBtn").addEventListener("click", triggerSystemSessionTeardownClearance);
    }

    function initNJKFormConditionalLogic() {
      const propertyTypeSelect = document.getElementById('propertyType');
      const locationSelect = document.getElementById('location');
      
      const bedroomsContainer = document.getElementById('bedroomsContainer');
      const bedroomsInput = document.getElementById('bedrooms');
      
      const bathroomsContainer = document.getElementById('bathroomsContainer');
      const bathroomsInput = document.getElementById('bathrooms');
      
      const locationDetailContainer = document.getElementById('locationDetailContainer');
      const locationDetailLabel = document.getElementById('locationDetailLabel');
      const locationDetailInput = document.getElementById('locationDetail');

      // Property Type Change Logic Integration
      propertyTypeSelect.addEventListener('change', function() {
        const val = this.value;

        // Bedrooms conditional configuration tracking
        if (val === 'Flat' || val === 'Bungalow') {
          bedroomsContainer.classList.remove('hidden');
          bedroomsInput.setAttribute('required', 'required');
        } else {
          bedroomsContainer.classList.add('hidden');
          bedroomsInput.removeAttribute('required');
          bedroomsInput.value = '';
        }

        // Bathrooms conditional configuration tracking
        const allowedBathrooms = ['Flat', 'Bungalow', 'Shop', 'Office', 'Mezzanine', 'Basement'];
        if (allowedBathrooms.includes(val)) {
          bathroomsContainer.classList.remove('hidden');
          bathroomsInput.setAttribute('required', 'required');
        } else {
          bathroomsContainer.classList.add('hidden');
          bathroomsInput.removeAttribute('required');
          bathroomsInput.value = '';
        }
      });

      // Location Change Logic Integration
      locationSelect.addEventListener('change', function() {
        const val = this.value;

        if (!val) {
          locationDetailContainer.classList.add('hidden');
          locationDetailInput.removeAttribute('required');
          locationDetailInput.value = '';
          return;
        }

        locationDetailContainer.classList.remove('hidden');
        locationDetailInput.setAttribute('required', 'required');

        // Dynamic Labels Text Content Context Matrix Map
        switch (val) {
          case 'DHA Phase':
            locationDetailLabel.textContent = 'Enter DHA Phase';
            break;
          case 'Clifton Block':
            locationDetailLabel.textContent = 'Enter Clifton Block';
            break;
          case 'Bahria Town Karachi':
            locationDetailLabel.textContent = 'Enter BTK Precinct';
            break;
          case 'DHA City Karachi':
            locationDetailLabel.textContent = 'Enter DCK Sector';
            break;
          case 'Custom Location':
            locationDetailLabel.textContent = 'Enter Custom Location Name';
            break;
          default:
            locationDetailLabel.textContent = `Enter ${val} Area Detail`;
            break;
        }
      });
    }

    function applyUIPhraseTranslationSync() {
      document.querySelectorAll(".data-translate").forEach(el => {
        const textValue = el.getAttribute(`data-${sysState.currentLang}`);
        if(textValue) el.textContent = textValue;
      });
    }

    function toggleAuthTabs(target) {
      sysState.activeTab = target;
      const lTab = document.getElementById("switchLoginTab");
      const rTab = document.getElementById("switchRegisterTab");
      const nGroup = document.getElementById("nameFieldGroup");
      
      if (target === "login") {
        lTab.className = "w-1/2 py-2 text-center font-bold text-blue-700 border-b-2 border-blue-600";
        rTab.className = "w-1/2 py-2 text-center font-semibold text-slate-500 hover:text-slate-800";
        nGroup.classList.add("hidden");
        document.getElementById("authName").required = false;
      } else {
        rTab.className = "w-1/2 py-2 text-center font-bold text-blue-700 border-b-2 border-blue-600";
        lTab.className = "w-1/2 py-2 text-center font-semibold text-slate-500 hover:text-slate-800";
        nGroup.classList.remove("hidden");
        document.getElementById("authName").required = true;
      }
    }

    function displayMessage(msg, isSuccess = false) {
      const box = document.getElementById("alertBox");
      box.className = `p-4 rounded-xl border text-sm font-medium shadow-md transition-all duration-300 transform scale-100 ${
        isSuccess ? "bg-blue-50 text-blue-800 border-blue-200" : "bg-rose-50 text-rose-800 border-rose-200"
      }`;
      box.textContent = msg;
      box.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function clearMessage() {
      document.getElementById("alertBox").classList.add("hidden");
    }

    async function evaluateGlobalApplicationStateRoute() {
      if (!sysState.token) {
        document.getElementById("authView").classList.remove("hidden");
        document.getElementById("dashboardView").classList.add("hidden");
        document.getElementById("logoutBtn").classList.add("hidden");
        document.getElementById("userSessionBadge").classList.add("hidden");
        return;
      }

      try {
        const response = await fetch(`${SCRIPT_URL}?action=profile&method=GET&token=${sysState.token}`);
        const result = await response.json();
        
        if (result.success) {
          sysState.profile = result.data;
          renderDashboardWorkspaceLayout();
        } else {
          triggerSystemSessionTeardownClearance();
        }
      } catch (err) {
        displayMessage("Fatal Network System Error Connectivity Interface Exception. Confirm backend script runtime rules configurations.");
      }
    }

    async function handleAuthenticationFormTransactionPipeline(e) {
      e.preventDefault();
      clearMessage();
      
      const payload = {
        email: document.getElementById("authEmail").value.trim(),
        password: document.getElementById("authPassword").value
      };
      
      const targetAction = sysState.activeTab === "login" ? "login" : "register";
      if (targetAction === "register") {
        payload.name = document.getElementById("authName").value.trim();
      }

      try {
        const response = await fetch(`${SCRIPT_URL}?action=${targetAction}&method=POST`, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (result.success) {
          if (targetAction === "login") {
            localStorage.setItem("z_system_auth_token", result.data.token);
            sysState.token = result.data.token;
            await evaluateGlobalApplicationStateRoute();
          } else {
            displayMessage("Account registration commit finalized. Transitioning authentication gateway channels.", true);
            toggleAuthTabs("login");
          }
        } else {
          displayMessage(result.error || "Authentication structural parsing processing failure.");
        }
      } catch (err) {
        displayMessage("Fatal network pipeline mapping boundary check failed processing transmission.");
      }
    }

    function renderDashboardWorkspaceLayout() {
      document.getElementById("authView").classList.add("hidden");
      document.getElementById("dashboardView").classList.remove("hidden");
      document.getElementById("logoutBtn").classList.remove("hidden");
      
      const badge = document.getElementById("userSessionBadge");
      badge.textContent = `ID: ${sysState.profile.id} [${sysState.profile.name}]`;
      badge.classList.remove("hidden");

      document.getElementById("quotaPostVal").textContent = sysState.profile.assigned_post_quota;
      document.getElementById("quotaRefreshVal").textContent = sysState.profile.assigned_refresh_quota;
      document.getElementById("accountRoleVal").textContent = sysState.profile.role;

      fetchAgentCatalogListingsCollection();
    }

    async function fetchAgentCatalogListingsCollection() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=posts&method=GET&token=${sysState.token}`);
        const result = await response.json();
        if (result.success) {
          sysState.listings = result.data;
          renderListingsCatalogFeedItemsGrid();
        }
      } catch (err) {
        console.error("Internal collection synchronization process context trace fault vectors mapping exception.");
      }
    }

    function renderListingsCatalogFeedItemsGrid() {
      const container = document.getElementById("postsContainer");
      container.innerHTML = "";

      if(sysState.listings.length === 0) {
        container.innerHTML = `<div class="p-8 text-center text-sm text-slate-400 font-medium tracking-wide">No catalog database asset index entries located tracking numbers null.</div>`;
        return;
      }

      sysState.listings.forEach(p => {
        const wrapper = document.createElement("div");
        wrapper.className = "p-4 border border-slate-100 rounded-xl bg-slate-50/50 hover:bg-slate-50 flex justify-between items-start flex-wrap gap-4 transition shadow-xs";
        
        let badgeColor = "bg-slate-100 text-slate-600";
        if(p.refresh_level === "Hot") badgeColor = "bg-amber-100 text-amber-700 font-semibold";
        if(p.refresh_level === "Super Hot") badgeColor = "bg-orange-100 text-orange-700 font-bold";
        if(p.refresh_level === "Titanium") badgeColor = "bg-blue-100 text-blue-700 font-extrabold ring-1 ring-blue-300";

        wrapper.innerHTML = `
          <div class="space-y-1">
            <div class="flex items-center space-x-2 flex-wrap gap-1">
              <span class="text-xs font-mono font-bold px-2 py-0.5 rounded bg-slate-200 text-slate-700">${p.id}</span>
              <span class="text-xs font-medium px-2 py-0.5 rounded ${badgeColor}">${p.refresh_level || 'Standard'}</span>
              <span class="text-xs font-bold text-blue-600 font-mono">${Number(p.price).toLocaleString()} PKR</span>
            </div>
            <h4 class="font-bold text-slate-800 text-sm">${p.title}</h4>
            <p class="text-xs text-slate-500 font-medium">${p.location} (${p.location_detail || 'N/A'}) | ${p.property_type} | ${p.purpose}</p>
            <p class="text-xs text-slate-400 font-medium">Area: ${p.area} ${p.area_unit} | Beds: ${p.bedrooms || 0} | Baths: ${p.bathrooms || 0}</p>
            <p class="text-[11px] text-slate-400 font-mono">Agent: ${p.agent_name} [${p.agency_name}]</p>
          </div>
          <div class="flex items-center space-x-2">
            <select id="boostTier-${p.id}" class="text-xs border px-2 py-1 rounded bg-white font-medium focus:outline-none">
              <option value="Hot">Hot (2 pts)</option>
              <option value="Super Hot">Super Hot (3 pts)</option>
              <option value="Titanium">Titanium (5 pts)</option>
            </select>
            <button onclick="commitListingRefreshActionRequest('${p.id}')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-3 py-1 rounded-lg transition shadow-xs cursor-pointer">Refresh</button>
            <button onclick="triggerListingDeletionPipeline('${p.id}')" class="bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold text-xs px-2 py-1 rounded-lg transition border border-rose-200/40 cursor-pointer">✕</button>
          </div>
        `;
        container.appendChild(wrapper);
      });
    }

    async function handleListingCreationPipelineCommit(e) {
      e.preventDefault();
      clearMessage();

      // Mapping 100% inputs parameters matching your form fields
      const payload = {
        title: document.getElementById("title").value.trim(),
        description: document.getElementById("description").value.trim(),
        property_type: document.getElementById("propertyType").value,
        location: document.getElementById("location").value,
        location_detail: document.getElementById("locationDetail").value.trim(),
        purpose: document.getElementById("purpose").value,
        price: Number(document.getElementById("price").value),
        area: Number(document.getElementById("areaValue").value),
        area_unit: document.getElementById("areaUnit").value,
        bedrooms: Number(document.getElementById("bedrooms").value) || 0,
        bathrooms: Number(document.getElementById("bathrooms").value) || 0,
        agent_name: document.getElementById("agentName").value.trim(),
        agency_name: document.getElementById("agencyName").value.trim(),
        contact_number: document.getElementById("contactNumber").value.trim(),
        token: sysState.token
      };

      try {
        const response = await fetch(`${SCRIPT_URL}?action=posts&method=POST`, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (result.success) {
          document.getElementById("propertyForm").reset();
          // Hide dynamic containers manually post reset trigger
          document.getElementById('bedroomsContainer').classList.add('hidden');
          document.getElementById('bathroomsContainer').classList.add('hidden');
          document.getElementById('locationDetailContainer').classList.add('hidden');
          
          await evaluateGlobalApplicationStateRoute();
          displayMessage("NJK Property Magazine asset listing mapped to backend server dataset successfully.", true);
        } else {
          displayMessage(result.error || "Execution error processing backend database record injection workflow.");
        }
      } catch (err) {
        displayMessage("Fatal operational context exception boundaries data serialization failure.");
      }
    }

    async function commitListingRefreshActionRequest(postId) {
      clearMessage();
      const selectedTier = document.getElementById(`boostTier-${postId}`).value;
      const payload = {
        post_id: postId,
        refresh_level: selectedTier,
        token: sysState.token
      };

      try {
        const response = await fetch(`${SCRIPT_URL}?action=refresh-post&method=POST`, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if(result.success) {
          await evaluateGlobalApplicationStateRoute();
          displayMessage(`Listing manual refresh level boost sequence applied successfully to target node: ${postId}`, true);
        } else {
          displayMessage(result.error || "Boost assignment execution mismatch transaction parameter failure.");
        }
      } catch (err) {
        displayMessage("Network transport transmission routing processing verification fault.");
      }
    }

    async function triggerListingDeletionPipeline(postId) {
      if(!confirm("Are you certain you wish to flag this asset row visibility parameter matrix to archived state offline?")) return;
      clearMessage();

      try {
        const response = await fetch(`${SCRIPT_URL}?action=posts&method=DELETE&id=${postId}&token=${sysState.token}`, {
          method: "POST"
        });
        const result = await response.json();

        if(result.success) {
          await evaluateGlobalApplicationStateRoute();
          displayMessage(`Listing row identity entry ${postId} flagged archived offline successfully.`, true);
        } else {
          displayMessage(result.error || "Access management visibility modification validation error.");
        }
      } catch (err) {
        displayMessage("Data channel streaming verification trace fault error processing.");
      }
    }

    function triggerSystemSessionTeardownClearance() {
      localStorage.removeItem("z_system_auth_token");
      sysState.token = null;
      sysState.profile = null;
      sysState.listings = [];
      clearMessage();
      evaluateGlobalApplicationStateRoute();
    }
  </script>
</body>
</html>
