<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJK Property Magazine SaaS Single Core Architecture</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col justify-between">

  <div id="global-loading-barrier" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex flex-col items-center justify-center z-[100]">
    <div class="bg-white px-6 py-4 rounded-xl shadow-2xl border border-slate-100 flex items-center space-x-3 max-w-xs mx-auto">
      <div class="w-5 h-5 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
      <span class="text-xs font-mono font-bold tracking-tight text-slate-700 uppercase">Syncing Cloud Node Ledger...</span>
    </div>
  </div>

  <div id="app" class="flex-grow flex flex-col">
    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center space-x-4 md:space-x-8">
          <h1 onclick="navigate('portal-home')" class="text-lg md:text-xl font-black tracking-tight text-indigo-600 cursor-pointer whitespace-nowrap">NJK RealEstate</h1>
          
          <div class="hidden md:flex items-center space-x-6 text-xs font-bold uppercase tracking-wider text-slate-600">
            <button onclick="navigate('portal-home')" class="hover:text-indigo-600 transition">Marketplace Home</button>
            <button onclick="navigate('portal-archive')" class="hover:text-indigo-600 transition">Browse Catalogs</button>
            <button onclick="navigate('dashboard')" class="hover:text-indigo-600 transition">Agent Workspace</button>
            <button id="nav-admin-btn" onclick="navigate('admin-panel')" class="hidden bg-red-50 text-red-700 font-black px-2.5 py-1 rounded border border-red-200 hover:bg-red-100 transition">Admin Console</button>
          </div>
        </div>

        <div class="flex items-center space-x-3">
          <nav id="nav-auth-actions" class="hidden md:flex items-center space-x-4"></nav>
          
          <button onclick="toggleMobileNavMenu()" class="block md:hidden p-2 text-slate-600 hover:text-indigo-600 focus:outline-none" aria-label="Toggle Navigation Menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
          </button>
        </div>
      </div>

      <div id="mobile-nav-drawer" class="hidden md:hidden border-t border-slate-100 bg-white px-4 py-3 space-y-3 shadow-inner text-xs font-bold uppercase tracking-wider text-slate-600">
        <button onclick="navigate('portal-home'); toggleMobileNavMenu();" class="block w-full text-left py-2 hover:text-indigo-600">Marketplace Home</button>
        <button onclick="navigate('portal-archive'); toggleMobileNavMenu();" class="block w-full text-left py-2 hover:text-indigo-600">Browse Catalogs</button>
        <button onclick="navigate('dashboard'); toggleMobileNavMenu();" class="block w-full text-left py-2 hover:text-indigo-600">Agent Workspace</button>
        <button id="nav-mobile-admin-btn" onclick="navigate('admin-panel'); toggleMobileNavMenu();" class="hidden w-full text-left bg-red-50 text-red-700 font-black px-2 py-2 rounded border border-red-100">Admin Console</button>
        <hr class="border-slate-100">
        <div id="nav-mobile-auth-actions" class="space-y-2 pt-1"></div>
      </div>
    </header>

    <main class="flex-grow p-4 md:p-8 max-w-7xl w-full mx-auto">
      <div id="spa-view-mount" class="bg-white p-4 sm:p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 transition-all">
        </div>
    </main>
  </div>

  <footer class="bg-white border-t border-slate-200 text-center py-4 text-[10px] md:text-xs text-slate-400 font-medium px-4">
    &copy; 2026 NJK Property Magazine Corporation. Consolidated Unified Platform Standard Release Core V5.
  </footer>

  <script>
    // =========================================================================
    // CORE INITIALIZATION LAYER CONFIG CONNECTIONS
    // =========================================================================
    const API_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

    const state = {
      token: localStorage.getItem('njk_session_token') || null,
      user: null,
      visitorId: localStorage.getItem('njk_visitor_id') || 'vst_' + Math.random().toString(36).substring(2, 11),
      currentPostDetailId: null,
      currentEditingPostId: null,
      activeAdminTab: 'users',
      filters: { search: '', location: '', property_type: '', purpose: '', max_price: '' }
    };
    localStorage.setItem('njk_visitor_id', state.visitorId);

    const getLocalWatched = () => JSON.parse(localStorage.getItem('njk_local_watched') || '[]');
    const saveLocalWatched = (id) => { const w = getLocalWatched(); if(!w.includes(id)){ w.push(id); localStorage.setItem('njk_local_watched', JSON.stringify(w)); } };

    function toggleMobileNavMenu() {
      document.getElementById('mobile-nav-drawer').classList.toggle('hidden');
    }

    // =========================================================================
    // CENTRAL SHARED API FRAMEWORK PIPELINES SERVICE MATRIX (GLOBAL HOOKS)
    // =========================================================================
    function toggleLoading(show) {
      document.getElementById('global-loading-barrier').classList.toggle('hidden', !show);
    }

    async function apiCall(action, method = 'GET', body = null, idParam = null) {
      toggleLoading(true);
      let targetUrl = `${API_URL}?action=${action}&method=${method}`;
      if(state.token) targetUrl += `&token=${encodeURIComponent(state.token)}`;
      if(idParam) targetUrl += `&id=${encodeURIComponent(idParam)}`;
      if(action === 'public-posts') {
        Object.keys(state.filters).forEach(k => { if(state.filters[k]) targetUrl += `&${k}=${encodeURIComponent(state.filters[k])}`; });
      }
      if(action === 'public-post-detail') targetUrl += `&visitor_id=${state.visitorId}`;

      try {
        const options = { method: 'POST', mode: 'cors' };
        if(body) options.body = JSON.stringify(body);
        
        const response = await fetch(targetUrl, body || method === 'POST' ? options : { method: 'GET', mode: 'cors' });
        const result = await response.json();
        
        if(!result.success) {
          alert(`Operational Execution Rejection: ${result.error}`);
          if(result.code === 401) logout();
          return null;
        }
        return result.data;
      } catch (err) {
        alert("Fatal core transmission network protocol disruption anomaly.");
        return null;
      } finally {
        toggleLoading(false);
      }
    }

    // =========================================================================
    // CENTRALIZED CENTRAL SPA NAVIGATION MATRIX ROUTER
    // =========================================================================
    async function navigate(view) {
      const mount = document.getElementById('spa-view-mount');
      const adminBtn = document.getElementById('nav-admin-btn');
      const mobileAdminBtn = document.getElementById('nav-mobile-admin-btn');
      updateAuthNavbar();

      if(state.user && state.user.role === 'Admin') {
        adminBtn.classList.remove('hidden');
        mobileAdminBtn.classList.remove('hidden');
      } else {
        adminBtn.classList.add('hidden');
        mobileAdminBtn.classList.add('hidden');
      }

      switch(view) {
        case 'portal-home':
          mount.innerHTML = renderPortalHomeTemplate();
          const pData = await apiCall('public-posts', 'GET');
          if(pData) document.getElementById('home-featured-grid').innerHTML = buildPropertyCardsGridHtml(pData.slice(0,3));
          break;
        case 'portal-archive':
          mount.innerHTML = renderPortalArchiveLayoutTemplate();
          const archiveData = await apiCall('public-posts', 'GET');
          if(archiveData) {
            document.getElementById('archive-count-label').innerText = `${archiveData.length} Authenticated Property Node Entries Active inside Database Mapping Arrays.`;
            document.getElementById('archive-listings-grid').innerHTML = buildPropertyCardsGridHtml(archiveData);
          }
          break;
        case 'portal-detail':
          const dItem = await apiCall('public-post-detail', 'GET', null, state.currentPostDetailId);
          if(dItem) { saveLocalWatched(dItem.id); mount.innerHTML = renderSinglePropertyViewPage(dItem); }
          break;
        case 'login': mount.innerHTML = renderLoginGateTemplate(); break;
        case 'signup': mount.innerHTML = renderSignupGateTemplate(); break;
        case 'dashboard':
          if(!state.token) { navigate('login'); return; }
          const profile = await apiCall('profile', 'GET');
          const agentPosts = await apiCall('posts', 'GET');
          if(profile && agentPosts) { state.user = profile; mount.innerHTML = renderAgentDashboardWorkspace(profile, agentPosts); }
          break;
        case 'create-post':
          state.currentEditingPostId = null;
          mount.innerHTML = renderListingFormTemplate("Publish Premium Database Listing Row Node", "Append Spreadsheet Entry Block");
          break;
        case 'edit-post':
          const postToEdit = await apiCall('posts', 'GET', null, state.currentEditingPostId);
          if(postToEdit) mount.innerHTML = renderListingFormTemplate("Modify Architectural Structural Parameters Data", "Synchronize Spreadsheet Parameters Matrix", postToEdit);
          break;
        case 'admin-panel':
          if(!state.token || state.user.role !== 'Admin') { navigate('portal-home'); return; }
          mount.innerHTML = renderAdminConsoleLayoutFrame();
          executeAdminTabNavigation(state.activeAdminTab);
          break;
      }
    }

    function updateAuthNavbar() {
      const target = document.getElementById('nav-auth-actions');
      const mobileTarget = document.getElementById('nav-mobile-auth-actions');
      
      const authHtml = state.token 
        ? `<button onclick="logout()" class="w-full md:w-auto text-center text-xs font-bold text-red-600 uppercase border border-red-200 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 transition">Kill Session</button>`
        : `
          <button onclick="navigate('login')" class="block md:inline-block w-full md:w-auto text-left md:text-center text-xs font-bold uppercase tracking-wider text-slate-600 hover:text-indigo-600 transition py-2 md:px-3">Sign In</button>
          <button onclick="navigate('signup')" class="block md:inline-block w-full md:w-auto text-center text-xs font-bold uppercase tracking-wider bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition shadow-sm">Register</button>
        `;
        
      target.innerHTML = authHtml;
      mobileTarget.innerHTML = authHtml;
    }

    function logout() { state.token = null; state.user = null; localStorage.removeItem('njk_session_token'); navigate('portal-home'); }

    // =========================================================================
    // AGENT CONTROLLERS ACTIONS INTERFACE HANDLERS
    // =========================================================================
    async function handleAuthPipelineSubmission(e, routeAction) {
      e.preventDefault();
      const payload = { email: document.getElementById('auth-email').value, password: document.getElementById('auth-pass').value };
      if(routeAction === 'register') payload.name = document.getElementById('auth-name').value;
      
      const resData = await apiCall(routeAction, 'POST', payload);
      if(resData) {
        if(routeAction === 'login') {
          state.token = resData.token; localStorage.setItem('njk_session_token', resData.token);
          const p = await apiCall('profile', 'GET'); if(p) { state.user = p; navigate(p.role === 'Admin'?'admin-panel':'dashboard'); }
        } else {
          alert("Registration matrix completed successfully. Invoke login access handshake parameter blocks."); navigate('login');
        }
      }
    }

    async function handlePropertyDataRowCommit(e) {
      e.preventDefault();
      const payload = {
        title: document.getElementById('p-title').value, description: document.getElementById('p-desc').value,
        property_type: document.getElementById('p-type').value, purpose: document.getElementById('p-purpose').value,
        price: document.getElementById('p-price').value, area: document.getElementById('p-area').value, area_unit: document.getElementById('p-unit').value,
        bedrooms: document.getElementById('p-beds').value, bathrooms: document.getElementById('p-baths').value,
        location: document.getElementById('p-loc').value, location_detail: document.getElementById('p-loc-det').value,
        contact_number: document.getElementById('p-phone').value
      };
      const act = state.currentEditingPostId ? 'posts' : 'posts';
      const meth = state.currentEditingPostId ? 'PUT' : 'POST';
      const r = await apiCall(act, meth, payload, state.currentEditingPostId);
      if(r) { alert("Spreadsheet record mapping synchronization verified transaction clear."); navigate('dashboard'); }
    }

    async function invokeSoftArchiveDeletion(id) {
      if(confirm("Flag target data spreadsheet row index reference offline to hidden visibility metrics?")) {
        if(await apiCall('posts', 'DELETE', null, id)) navigate('dashboard');
      }
    }

    async function submitAgentQuotaClaim(e) {
      e.preventDefault();
      const payload = { requested_posts: document.getElementById('req-p').value, requested_refresh: document.getElementById('req-r').value };
      if(await apiCall('quota-request', 'POST', payload)) { alert("Claim row logged inside backend ledger sheets workflows."); navigate('dashboard'); }
    }

    async function acquireProductBundleIntent(dealId) {
      if(confirm("Authorize structural system ledger purchase processing execution tracing sequence pipeline?")) {
        if(await apiCall('deal-request', 'POST', { deal_id: dealId })) { alert("Purchase file queued verification checks path pending."); navigate('dashboard'); }
      }
    }

    async function processInstantBoostAllocation(postId) {
      const tier = document.getElementById(`boost-select-${postId}`).value;
      if(!tier) return;
      if(confirm(`Commit balance point updates to modify badging configuration to ${tier} status layers?`)) {
        if(await apiCall('refresh-post', 'POST', { post_id: postId, refresh_level: tier })) { alert("Optimization layer deployed."); navigate('dashboard'); }
      }
    }

    // =========================================================================
    // PUBLIC COMPONENT HTML LAYOUT GENERATION PATTERNS
    // =========================================================================
    function renderPortalHomeTemplate() {
      return `
        <div class="text-center py-10 md:py-16 bg-gradient-to-tr from-slate-900 via-indigo-950 to-slate-900 rounded-2xl md:rounded-3xl text-white px-4 shadow-xl mb-8 md:mb-12">
          <h2 class="text-xl md:text-3xl font-black mb-2 uppercase tracking-tight">Unified Property Discovery Engine</h2>
          <p class="text-[11px] md:text-xs text-indigo-200/80 max-w-lg mx-auto mb-6 md:mb-8 font-medium">Real-time listing matrix prioritized by tier indexing structures tracking live spreadsheet data pipelines directly.</p>
          <div class="max-w-xl mx-auto bg-white p-1.5 rounded-xl shadow-lg flex flex-col sm:flex-row gap-2 border">
            <input type="text" id="home-search-field" placeholder="Enter keywords, structural addresses, features..." class="w-full text-slate-800 px-4 py-2 focus:outline-none text-xs font-medium rounded-lg">
            <button onclick="state.filters.search=document.getElementById('home-search-field').value; navigate('portal-archive');" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-6 py-2.5 rounded-lg text-xs uppercase tracking-wider transition">Search</button>
          </div>
        </div>
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-6">
          <h3 class="text-xs font-black uppercase tracking-widest text-slate-400">Featured Real Estate Nodes</h3>
          <button onclick="navigate('portal-archive')" class="text-xs font-bold text-indigo-600 underline hover:text-indigo-700 transition">View Full Database Stack &rarr;</button>
        </div>
        <div id="home-featured-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>`;
    }

    function renderPortalArchiveLayoutTemplate() {
      return `
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
          <div class="bg-slate-50 p-4 md:p-6 rounded-2xl border space-y-4 h-fit">
            <h3 class="text-xs font-black uppercase tracking-wider text-slate-400 mb-2">Filters Matrix Parameters</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3 sm:gap-4">
              <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Keyword Title Search</label><input type="text" id="f-search" value="${state.filters.search}" class="w-full text-xs px-3 py-2 border rounded-lg bg-white"></div>
              <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Target Location</label><input type="text" id="f-loc" value="${state.filters.location}" class="w-full text-xs px-3 py-2 border rounded-lg bg-white" placeholder="Lahore, Karachi..."></div>
              <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Property Layout</label><select id="f-type" class="w-full text-xs px-3 py-2 border rounded-lg bg-white font-medium"><option value="">All Structural Categories</option><option value="House">House</option><option value="Flat">Flat</option><option value="Commercial">Commercial</option><option value="Plot">Plot</option></select></div>
              <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Deal Purpose</label><select id="f-purpose" class="w-full text-xs px-3 py-2 border rounded-lg bg-white font-medium"><option value="">All Vectors</option><option value="For Sale">For Sale</option><option value="For Rent">For Rent</option></select></div>
              <div class="sm:col-span-2 lg:col-span-1"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Max Price Ceiling Threshold (PKR)</label><input type="number" id="f-price" value="${state.filters.max_price}" class="w-full text-xs px-3 py-2 border rounded-lg bg-white"></div>
            </div>
            <button onclick="state.filters={search:document.getElementById('f-search').value,location:document.getElementById('f-loc').value,property_type:document.getElementById('f-type').value,purpose:document.getElementById('f-purpose').value,max_price:document.getElementById('f-price').value}; navigate('portal-archive');" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs py-2.5 rounded-lg transition uppercase tracking-wider shadow-sm">Execute Constraints</button>
          </div>
          <div class="lg:col-span-3 space-y-4">
            <div id="archive-count-label" class="text-xs font-mono font-bold text-slate-400">Evaluating platform assets inventory data maps...</div>
            <div id="archive-listings-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
          </div>
        </div>`;
    }

    function buildPropertyCardsGridHtml(list) {
      if(list.length === 0) return `<div class="col-span-full text-center py-12 text-slate-400 font-mono text-xs border border-dashed rounded-xl bg-slate-50">No structural row entities verify query matches.</div>`;
      let html = ''; const watched = getLocalWatched();
      list.forEach(p => {
        const hasWatched = watched.includes(p.id) ? `<span class="bg-slate-900 text-white text-[9px] font-bold px-1.5 py-0.5 rounded border border-slate-700 shrink-0">👀 WATCHED</span>` : '';
        const level = Number(p.refresh_level) || 0;
        let b = `<span class="bg-slate-100 text-slate-500 text-[9px] px-1.5 py-0.5 rounded font-bold uppercase shrink-0">Standard</span>`;
        if(level === 10) b = `<span class="bg-purple-600 text-white text-[9px] px-1.5 py-0.5 rounded font-black tracking-wider uppercase animate-pulse shrink-0">⚡ Titanium</span>`;
        else if(level === 7) b = `<span class="bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded font-black tracking-wider uppercase shrink-0">🔥 Super Hot</span>`;
        else if(level === 5) b = `<span class="bg-orange-500 text-white text-[9px] px-1.5 py-0.5 rounded font-bold uppercase shrink-0">💥 Hot</span>`;
        else if(level === 1) b = `<span class="bg-blue-500 text-white text-[9px] px-1.5 py-0.5 rounded font-medium uppercase shrink-0">Boosted</span>`;

        html += `
          <div class="border rounded-2xl overflow-hidden bg-white shadow-sm hover:shadow-md transition flex flex-col justify-between">
            <div class="p-4 md:p-5 space-y-2">
              <div class="flex items-center space-x-1.5 overflow-x-auto pb-1">${b} ${hasWatched}</div>
              <h4 onclick="state.currentPostDetailId='${p.id}'; navigate('portal-detail');" class="text-sm md:text-base font-black text-slate-900 hover:text-indigo-600 cursor-pointer line-clamp-1 transition uppercase">${p.title}</h4>
              <p class="text-xs text-slate-400 line-clamp-2 font-medium">${p.description}</p>
              <div class="bg-slate-50 p-2.5 rounded-lg text-[11px] font-mono font-bold text-slate-500 space-y-0.5">
                <div class="truncate">Hub: <span class="text-slate-800 font-sans">${p.location} (${p.location_detail})</span></div>
                <div class="truncate">Config: <span class="text-slate-800 font-sans">${p.area} ${p.area_unit} &bull; ${p.bedrooms}B / ${p.bathrooms}B</span></div>
              </div>
            </div>
            <div class="p-4 border-t bg-slate-50/50 flex justify-between items-center gap-2">
              <div class="text-xs md:text-sm font-black text-indigo-600 truncate">PKR ${Number(p.price).toLocaleString()}</div>
              <button onclick="state.currentPostDetailId='${p.id}'; navigate('portal-detail');" class="bg-white border font-bold text-xs px-3 py-1 rounded-lg shadow-sm hover:bg-slate-50 transition shrink-0">Inspect</button>
            </div>
          </div>`;
      });
      return html;
    }

    function renderSinglePropertyViewPage(p) {
      const waMsg = encodeURIComponent(`Inquiry trace regarding property catalog entry: ${p.title} (Ref: ${p.id}). Verify current market availability configurations.`);
      return `
        <div class="max-w-4xl mx-auto space-y-6">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 border-b pb-4">
            <button onclick="navigate('portal-archive')" class="text-xs font-bold text-slate-500 hover:text-slate-900 transition">&larr; Back to Catalog Data Stack</button>
            <span class="text-[10px] md:text-[11px] font-mono font-bold bg-indigo-50 text-indigo-700 border border-indigo-100 px-3 py-1 rounded-full">📊 Telemetry Metrics: ${p.total_views} Live Read Impressions</span>
          </div>
          <div class="space-y-1">
            <div class="flex items-center space-x-2"><span class="bg-slate-950 text-white text-[9px] font-mono tracking-widest px-2 py-0.5 rounded font-bold uppercase">System Analytics Tracked</span></div>
            <h2 class="text-xl md:text-2xl font-black text-slate-900 uppercase">${p.title}</h2>
            <div class="text-base md:text-lg font-black text-indigo-600">PKR ${Number(p.price).toLocaleString()} Valuation Point</div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 bg-slate-50 p-4 border rounded-xl text-xs font-mono font-bold text-slate-500">
            <div class="bg-white p-2.5 rounded-lg border border-slate-100">Target City: <div class="text-slate-900 font-sans text-sm font-bold mt-0.5">${p.location}</div></div>
            <div class="bg-white p-2.5 rounded-lg border border-slate-100">Detailed Sector: <div class="text-slate-900 font-sans text-sm font-bold mt-0.5">${p.location_detail}</div></div>
            <div class="bg-white p-2.5 rounded-lg border border-slate-100">Blueprint Grid: <div class="text-slate-900 font-sans text-sm font-bold mt-0.5">${p.property_type} (${p.purpose})</div></div>
            <div class="bg-white p-2.5 rounded-lg border border-slate-100">Volumetric Bounds: <div class="text-slate-900 font-sans text-sm font-bold mt-0.5">${p.area} ${p.area_unit}</div></div>
            <div class="bg-white p-2.5 rounded-lg border border-slate-100">Bedrooms Config: <div class="text-slate-900 font-sans text-sm font-bold mt-0.5">${p.bedrooms} Beds</div></div>
            <div class="bg-white p-2.5 rounded-lg border border-slate-100">Bathrooms Unit: <div class="text-slate-900 font-sans text-sm font-bold mt-0.5">${p.bathrooms} Baths</div></div>
          </div>
          <div class="space-y-2">
            <h3 class="text-xs font-black uppercase tracking-wider text-slate-400">Deep Structural Log Summary</h3>
            <p class="text-slate-700 text-xs md:text-sm bg-white border p-4 rounded-xl leading-relaxed shadow-sm font-medium whitespace-pre-line">${p.description}</p>
          </div>
          <div class="bg-slate-900 text-white p-4 md:p-6 rounded-2xl border border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="w-full md:w-auto">
              <span class="text-[9px] tracking-widest font-mono font-bold text-indigo-400 block uppercase">Assigned Listing Agent Node</span>

                <td class="px-4 py-3 font-mono text-slate-900 font-bold">${req.deal_id}</td>
                <td class="px-4 py-3 font-mono text-slate-600">${req.user_id}</td>
                <td class="px-4 py-3"><span class="px-1.5 py-0.5 rounded text-[10px] font-black uppercase ${req.status==='pending'?'bg-amber-50 text-amber-700':req.status==='accepted'?'bg-green-50 text-green-700':'bg-red-50 text-red-700'}">${req.status}</span></td>
                <td class="px-4 py-3 italic text-slate-400 max-w-[150px] truncate">${req.admin_note || '&mdash;'}</td>
                <td class="px-4 py-3 text-right">${req.status==='pending'?`<button onclick="launchAuditClearingModal('deal','${req.id}')" class="bg-indigo-600 text-white text-[10px] font-bold px-2.5 py-1 rounded hover:bg-indigo-700 transition shadow-sm">Audit</button>`:`<span class="text-slate-300 italic text-[11px]">Locked</span>`}</td>
              </tr>`;
          });
          target.innerHTML = `<div class="bg-white border rounded-xl overflow-x-auto shadow-sm"><table class="w-full text-left border-collapse min-w-[650px]"><thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase border-b border-slate-100"><tr><th class="px-4 py-3">Transaction ID</th><th class="px-4 py-3">Target Bundle</th><th class="px-4 py-3">Applicant User</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Remarks Log</th><th class="px-4 py-3 text-right">Directives</th></tr></thead><tbody>${rows?rows:'<tr><td colspan="6" class="text-center py-6 text-slate-400 font-mono">Order purchase pipeline entries empty.</td></tr>'}</tbody></table></div>`;
        }
      }
    }

    // =========================================================================
    // MODAL DIALOGS ADMIN ASSIGNMENT INTERACTIVE INJECTION LAYERS
    // =========================================================================
    function triggerOverrideModalLauncher(uid, cp, cr) {
      const h = `
        <div id="modal-mount" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[200]">
          <div class="bg-white rounded-2xl max-w-sm w-full p-5 sm:p-6 border shadow-2xl text-xs space-y-4">
            <div><h4 class="text-sm font-black uppercase text-slate-900">Direct Force Quota Assignment Override</h4><p class="text-slate-400 font-mono text-[10px] mt-0.5">Target Context Node: ${uid}</p></div>
            <div class="space-y-3">
              <div><label class="block font-bold text-slate-600 mb-1">Absolute Allocation Post Capacity</label><input type="number" id="mo-p" value="${cp}" class="w-full px-3 py-2 border rounded-lg bg-white font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500/20"></div>
              <div><label class="block font-bold text-slate-600 mb-1">Absolute Allocation Refresh Token Count</label><input type="number" id="mo-r" value="${cr}" class="w-full px-3 py-2 border rounded-lg bg-white font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500/20"></div>
            </div>
            <div class="flex justify-end space-x-1.5 font-bold pt-1"><button onclick="document.getElementById('modal-container').remove()" class="px-3 py-2 border rounded-lg text-slate-500 hover:bg-slate-50 transition">Cancel</button><button onclick="executeForcedOverrideMutation('${uid}')" class="px-4 py-2 bg-slate-950 text-white rounded-lg hover:bg-slate-800 transition">Apply Forces</button></div>
          </div>
        </div>`;
      const d = document.createElement('div'); d.id='modal-container'; d.innerHTML=h; document.body.appendChild(d);
    }

    async function executeForcedOverrideMutation(uid) {
      const p = document.getElementById('mo-p').value; const r = document.getElementById('mo-r').value;
      if(await apiCall('assign-quota', 'POST', { user_id: uid, post_quota: p, refresh_quota: r })) { document.getElementById('modal-container').remove(); executeAdminTabNavigation('users'); }
    }

    function launchCreateDealStructureModal() {
      const h = `
        <div id="modal-mount" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[200]">
          <div class="bg-white rounded-2xl max-w-sm w-full p-5 sm:p-6 border shadow-2xl text-xs space-y-3">
            <h4 class="text-sm font-black uppercase text-slate-900 mb-2">Provision Commercial Bundle Product</h4>
            <div><label class="block font-bold text-slate-600 mb-1">Package Title Display Label *</label><input type="text" id="md-title" placeholder="Premium Starter Pack" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20"></div>
            <div><label class="block font-bold text-slate-600 mb-1">Marketing Description Summary</label><input type="text" id="md-desc" placeholder="Details..." class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20"></div>
            <div class="grid grid-cols-2 gap-2">
              <div><label class="block font-bold text-slate-600 mb-1">Post Allocation *</label><input type="number" id="md-post" value="10" class="w-full px-3 py-2 border rounded-lg focus:outline-none"></div>
              <div><label class="block font-bold text-slate-600 mb-1">Refresh Tokens *</label><input type="number" id="md-ref" value="20" class="w-full px-3 py-2 border rounded-lg focus:outline-none"></div>
            </div>
            <div><label class="block font-bold text-slate-600 mb-1">Financial Cost Price (PKR) *</label><input type="number" id="md-price" value="5000" class="w-full px-3 py-2 border rounded-lg focus:outline-none"></div>
            <div class="flex justify-end space-x-1.5 font-bold pt-2"><button onclick="document.getElementById('modal-container').remove()" class="px-3 py-2 border rounded-lg text-slate-500 hover:bg-slate-50 transition">Cancel</button><button onclick="executeDealProductCreation()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg uppercase tracking-wide hover:bg-indigo-700 transition">Commit Row</button></div>
          </div>
        </div>`;
      const d = document.createElement('div'); d.id='modal-container'; d.innerHTML=h; document.body.appendChild(d);
    }

    async function executeDealProductCreation() {
      const payload = { title: document.getElementById('md-title').value, description: document.getElementById('md-desc').value, post_quota: document.getElementById('md-post').value, refresh_quota: document.getElementById('md-ref').value, price: document.getElementById('md-price').value };
      if(await apiCall('deal', 'POST', payload)) { document.getElementById('modal-container').remove(); executeAdminTabNavigation('deals'); }
    }

    async function executeDealStateShift(id, targetState) {
      if(await apiCall('deal', 'PUT', { active: targetState }, id)) executeAdminTabNavigation('deals');
    }

    function launchAuditClearingModal(type, targetReqId) {
      const h = `
        <div id="modal-mount" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[200]">
          <div class="bg-white rounded-2xl max-w-sm w-full p-5 sm:p-6 border shadow-2xl text-xs space-y-4">
            <div><h4 class="text-sm font-black uppercase text-slate-900">Resolve Authorization Decision Case</h4><p class="text-slate-400 font-mono text-[10px] mt-0.5">Record Index Ref: ${targetReqId}</p></div>
            <div><label class="block font-bold text-slate-600 mb-1">Action Status Decision *</label><select id="ma-status" class="w-full px-3 py-2 border rounded-lg bg-white font-bold focus:outline-none"><option value="accepted">accepted — Approve and Top Up Balance</option><option value="rejected">rejected — Revoke Pipeline Request</option></select></div>
            <div><label class="block font-bold text-slate-600 mb-1">Auditor Remarks Notes</label><input type="text" id="ma-note" placeholder="Justification log notes..." class="w-full px-3 py-2 border rounded-lg focus:outline-none"></div>
            <div class="flex justify-end space-x-1.5 font-bold pt-1"><button onclick="document.getElementById('modal-container').remove()" class="px-3 py-2 border rounded-lg text-slate-500 hover:bg-slate-50 transition">Cancel</button><button onclick="executeAuditResolutionCommit('${type}','${targetReqId}')" class="px-4 py-2 bg-indigo-600 text-white rounded-lg uppercase tracking-wider hover:bg-indigo-700 transition">Commit Decision</button></div>
          </div>
        </div>`;
      const d = document.createElement('div'); d.id='modal-container'; d.innerHTML=h; document.body.appendChild(d);
    }

    async function executeAuditResolutionCommit(type, id) {
      const status = document.getElementById('ma-status').value; const note = document.getElementById('ma-note').value;
      const targetAction = type === 'quota' ? 'quota-request' : 'deal-request';
      if(await apiCall(targetAction, 'PUT', { status: status, admin_note: note }, id)) { document.getElementById('modal-container').remove(); executeAdminTabNavigation(type==='quota'?'quotas':'dealreqs'); }
    }

    // =========================================================================
    // DYNAMIC BOOTSTRAP APP FLOW ENTRY MATRIX RUNNER
    // =========================================================================
    navigate('portal-home');
  </script>
</body>
</html>
