<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJK Property Magazine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .badge-titanium { background: linear-gradient(135deg, #708090, #1a1a1a); color: #fff; }
        .badge-superhot { background: linear-gradient(135deg, #ff4500, #ff8c00); color: #fff; }
        .badge-hot { background: linear-gradient(135deg, #ff8c00, #ffd700); color: #fff; }
        .badge-normal { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased">

    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-xs">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer" onclick="navigateTo('portal')">
                    <i class="fa-solid fa-newspaper text-indigo-600 text-2xl mr-2"></i>
                    <span class="text-xl font-black text-slate-900 tracking-tight">NJK PROPERTY <span class="text-indigo-600 font-medium">MAGAZINE</span></span>
                </div>
                <div id="nav-auth-cluster" class="flex items-center gap-4">
                    </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="app-viewport">
            </div>
    </main>

    <footer class="border-t border-slate-200 bg-white mt-24 py-6 text-center text-xs text-slate-400 font-semibold tracking-wide uppercase">
        &copy; 2026 HNK & SHEEKAN TECH AND STUDIO. All Rights Reserved.
    </footer>

    <script>
        // REPLACE THIS EXPLICITLY WITH YOUR DEPLOYED GOOGLE APPS SCRIPT WEB APP LINK
        const API_URL = "https://script.google.com/macros/s/AKfycbwfPzHWJgJZvEoe31aAXhWC9igh8DNi2QRnt6YzbEVplZozFvIKiBXsiwIS4mB_6jQpYw/exec";
        
        // Global State Engine
        let state = {
            user: null,
            token: localStorage.getItem("token") || null,
            role: localStorage.getItem("role") || null,
            currentView: "portal",
            viewData: {},
            globalListings: []
        };

        // Initialize App Context
        window.addEventListener("DOMContentLoaded", async () => {
            generateVisitorId();
            if (state.token) {
                await syncSessionState();
            }
            renderApp();
        });

        function generateVisitorId() {
            if (!localStorage.getItem("visitor_id")) {
                localStorage.setItem("visitor_id", "VIS-" + Math.random().toString(36).substr(2, 9).toUpperCase());
            }
        }

        async function syncSessionState() {
            try {
                let res = await fetch(`${API_URL}?action=profile&token=${encodeURIComponent(state.token)}`);
                let json = await res.json();
                if (json.success) {
                    state.user = json.data;
                } else {
                    alert("Session Sync Error: " + (json.error || "Session Invalid"));
                    forceLogout();
                }
            } catch(e) {
                console.error("Session sync handshake exception occurred: ", e);
            }
        }

        function forceLogout() {
            localStorage.clear();
            state.token = null;
            state.role = null;
            state.user = null;
            state.currentView = "portal";
            renderApp();
        }

        function navigateTo(view, data = {}) {
            state.currentView = view;
            state.viewData = data;
            renderApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderApp() {
            renderNavbar();
            const viewport = document.getElementById("app-viewport");
            
            switch (state.currentView) {
                case "portal": return renderPortalView(viewport);
                case "login": return renderLoginView(viewport);
                case "register": return renderRegisterView(viewport);
                case "detail": return renderDetailView(viewport, state.viewData.id);
                case "dashboard": 
                    if (state.role === "admin") return renderAdminDashboard(viewport);
                    return renderAgentDashboard(viewport);
                case "postForm": return renderPostFormView(viewport, state.viewData.post);
                default: viewport.innerHTML = `<div class="p-8 text-center text-red-500">Routing Node Collapse Exception</div>`;
            }
        }

        function renderNavbar() {
            const cluster = document.getElementById("nav-auth-cluster");
            if (state.token) {
                cluster.innerHTML = `
                    <span class="text-sm font-semibold text-slate-600 hidden md:inline">Welcome, ${localStorage.getItem("name") || 'User'}</span>
                    <button onclick="navigateTo('dashboard')" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg shadow-xs hover:bg-indigo-700 transition">Dashboard</button>
                    <button onclick="forceLogout()" class="p-2 text-slate-400 hover:text-red-500 rounded-lg transition"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
                `;
            } else {
                cluster.innerHTML = `
                    <button onclick="navigateTo('login')" class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Sign In</button>
                    <button onclick="navigateTo('register')" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg shadow-xs hover:bg-indigo-700 transition">Register</button>
                `;
            }
        }

        // ==========================================
        // VIEW ARCHITECTURES (DOM ENGINE BINDINGS)
        // ==========================================

        async function renderPortalView(target) {
            target.innerHTML = `
                <div class="mb-8 bg-gradient-to-r from-indigo-900 to-slate-900 rounded-2xl p-8 md:p-12 text-white shadow-xl">
                    <h1 class="text-3xl md:text-5xl font-black mb-4 leading-tight">Find Your Next Premium Address</h1>
                    <p class="text-slate-300 text-base md:text-lg max-w-2xl mb-8">Real-time marketplace index for elite property listings with programmatic sorting.</p>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-white/10 p-4 rounded-xl backdrop-blur-md">
                        <select id="search-type" class="bg-white border-0 text-slate-800 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500">
                            <option value="">All Property Types</option>
                            <option value="House">House</option>
                            <option value="Apartment">Apartment</option>
                            <option value="Plot">Plot</option>
                            <option value="Commercial">Commercial</option>
                        </select>
                        <select id="search-purpose" class="bg-white border-0 text-slate-800 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500">
                            <option value="">Any Purpose</option>
                            <option value="For Sale">For Sale</option>
                            <option value="For Rent">For Rent</option>
                        </select>
                        <input type="text" id="search-loc" placeholder="City or Location..." class="bg-white border-0 text-slate-800 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500">
                        <button onclick="executeSearchFilter()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg p-3 text-sm transition shadow-sm">Search Catalog</button>
                    </div>
                </div>
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold text-slate-900">Verified Database Index</h2>
                    <span id="result-counter" class="text-sm font-medium text-slate-500">Loading listings...</span>
                </div>
                <div id="portal-listings-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            `;
            await loadPortalData();
        }

        async function loadPortalData() {
            const grid = document.getElementById("portal-listings-grid");
            try {
                let res = await fetch(`${API_URL}?action=getPublicPosts`);
                let json = await res.json();
                if (json.success) {
                    state.globalListings = json.data;
                    renderCards(state.globalListings);
                }
            } catch(e) {
                grid.innerHTML = `<div class="p-4 text-red-500 text-center col-span-3">Network gateway sync failure.</div>`;
            }
        }

        function renderCards(items) {
            const grid = document.getElementById("portal-listings-grid");
            const counter = document.getElementById("result-counter");
            counter.innerText = `${items.length} records populated`;
            
            if (items.length === 0) {
                grid.innerHTML = `<div class="p-12 text-slate-400 text-center col-span-3">No active properties match parameters.</div>`;
                return;
            }
            
            const localWatched = JSON.parse(localStorage.getItem("watched_registry") || "[]");

            grid.innerHTML = items.map(p => {
                let badgeClass = "badge-normal";
                if(p.refresh_level === "Titanium") badgeClass = "badge-titanium";
                if(p.refresh_level === "Super Hot") badgeClass = "badge-superhot";
                if(p.refresh_level === "Hot") badgeClass = "badge-hot";
                
                const isWatched = localWatched.includes(p.id);

                return `
                    <div class="bg-white rounded-xl overflow-hidden border border-slate-200 shadow-xs hover:shadow-md transition relative flex flex-col cursor-pointer" onclick="navigateTo('detail', {id: '${p.id}'})">
                        <span class="absolute top-3 right-3 text-[10px] font-black tracking-widest px-2.5 py-1 rounded-sm ${badgeClass}">
                            ${p.refresh_level.toUpperCase()}
                        </span>
                        <div class="p-5 flex-1 flex flex-col justify-between">
                            <div>
                                <div class="flex gap-2 items-center text-xs font-bold uppercase tracking-wider text-indigo-600 mb-2">
                                    <span>${p.property_type}</span>
                                    <span>•</span>
                                    <span>${p.purpose}</span>
                                    ${isWatched ? `<span class="ml-auto bg-slate-100 text-slate-600 text-[9px] px-1.5 py-0.5 rounded border border-slate-200 font-bold tracking-tight">WATCHED</span>` : ''}
                                </div>
                                <h3 class="text-lg font-bold text-slate-900 tracking-tight leading-snug mb-1 line-clamp-1">${p.title}</h3>
                                <p class="text-slate-500 text-xs mb-4 flex items-center gap-1"><i class="fa-solid fa-location-dot"></i> ${p.location}</p>
                                <div class="flex gap-4 mb-4 text-xs font-medium text-slate-600 bg-slate-50 p-2.5 rounded-lg">
                                    <span class="flex items-center gap-1"><i class="fa-solid fa-maximize text-slate-400"></i> ${p.area} ${p.area_unit}</span>
                                    ${p.bedrooms ? `<span class="flex items-center gap-1"><i class="fa-solid fa-bed text-slate-400"></i> ${p.bedrooms} Beds</span>` : ''}
                                    ${p.bathrooms ? `<span class="flex items-center gap-1"><i class="fa-solid fa-bath text-slate-400"></i> ${p.bathrooms} Baths</span>` : ''}
                                </div>
                            </div>
                            <div class="pt-4 border-t border-slate-100 flex items-center justify-between">
                                <span class="text-xl font-black text-slate-900">PKR ${Number(p.price).toLocaleString()}</span>
                                <span class="text-[11px] text-slate-400 font-medium">${p.agency_name || 'Independent'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function executeSearchFilter() {
            const type = document.getElementById("search-type").value;
            const purpose = document.getElementById("search-purpose").value;
            const loc = document.getElementById("search-loc").value.toLowerCase();
            
            let filtered = state.globalListings.filter(p => {
                if (type && p.property_type !== type) return false;
                if (purpose && p.purpose !== purpose) return false;
                if (loc && !p.location.toLowerCase().includes(loc) && !p.title.toLowerCase().includes(loc)) return false;
                return true;
            });
            renderCards(filtered);
        }

        function renderLoginView(target) {
            target.innerHTML = `
                <div class="max-w-md mx-auto bg-white border border-slate-200 rounded-2xl p-8 shadow-xs mt-12">
                    <h2 class="text-2xl font-black text-slate-900 mb-2 tracking-tight">Welcome Back</h2>
                    <p class="text-slate-500 text-sm mb-6">Enter platform configuration operational credentials.</p>
                    <form id="login-form" onsubmit="executeLogin(event)" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Email Address</label>
                            <input type="email" id="login-email" required class="w-full border border-slate-300 rounded-lg p-3 text-sm focus:outline-hidden focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Security Key Access Password</label>
                            <input type="password" id="login-pass" required class="w-full border border-slate-300 rounded-lg p-3 text-sm focus:outline-hidden focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        </div>
                        <div id="login-err" class="text-red-500 text-xs hidden font-medium"></div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg py-3 text-sm transition shadow-sm">Authorize Session</button>
                    </form>
                </div>
            `;
        }

        async function executeLogin(e) {
            e.preventDefault();
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-pass").value;
            const errNode = document.getElementById("login-err");
            
            try {
                let res = await fetch(`${API_URL}?action=login`, {
                    method: "POST",
                    body: JSON.stringify({ email, password })
                });
                let json = await res.json();
                if (json.success) {
                    localStorage.setItem("token", json.token);
                    localStorage.setItem("role", json.role);
                    localStorage.setItem("name", json.name);
                    state.token = json.token;
                    state.role = json.role;
                    await syncSessionState();
                    navigateTo("dashboard");
                } else {
                    errNode.innerText = json.error;
                    errNode.classList.remove("hidden");
                }
            } catch(err) {
                errNode.innerText = "API Transport Layer Execution Fault.";
                errNode.classList.remove("hidden");
            }
        }

        function renderRegisterView(target) {
            target.innerHTML = `
                <div class="max-w-md mx-auto bg-white border border-slate-200 rounded-2xl p-8 shadow-xs mt-12">
                    <h2 class="text-2xl font-black text-slate-900 mb-2 tracking-tight">Onboard Agent Portal</h2>
                    <p class="text-slate-500 text-sm mb-6">Create structural workspace account. Required: @gmail.com handle.</p>
                    <form id="register-form" onsubmit="executeRegister(event)" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Full Legal Corporate Identity Name</label>
                            <input type="text" id="reg-name" required class="w-full border border-slate-300 rounded-lg p-3 text-sm focus:outline-hidden focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Corporate Gmail Address</label>
                            <input type="email" id="reg-email" required placeholder="name@gmail.com" class="w-full border border-slate-300 rounded-lg p-3 text-sm focus:outline-hidden focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Platform Password</label>
                            <input type="password" id="reg-pass" required class="w-full border border-slate-300 rounded-lg p-3 text-sm focus:outline-hidden focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        </div>
                        <div id="reg-err" class="text-red-500 text-xs hidden font-medium"></div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg py-3 text-sm transition shadow-sm">Initialize Account</button>
                    </form>
                </div>
            `;
        }

        async function executeRegister(e) {
            e.preventDefault();
            const name = document.getElementById("reg-name").value;
            const email = document.getElementById("reg-email").value;
            const password = document.getElementById("reg-pass").value;
            const errNode = document.getElementById("reg-err");
            
            if (!email.toLowerCase().endsWith("@gmail.com")) {
                errNode.innerText = "Validation Exception: System architecture mandates verified standard @gmail.com accounts only.";
                errNode.classList.remove("hidden");
                return;
            }

            try {
                let res = await fetch(`${API_URL}?action=register`, {
                    method: "POST",
                    body: JSON.stringify({ name, email, password })
                });
                let json = await res.json();
                if(json.success) {
                    alert("Account context created successfully. Routing forward to verification gate.");
                    navigateTo("login");
                } else {
                    errNode.innerText = json.error;
                    errNode.classList.remove("hidden");
                }
            } catch(err) {
                errNode.innerText = "Transport pipeline validation timeout.";
                errNode.classList.remove("hidden");
            }
        }

        async function renderDetailView(target, id) {
            target.innerHTML = `<div class="p-12 text-center text-slate-500 font-medium"><i class="fa-solid fa-circle-notch animate-spin text-indigo-600 text-3xl mb-4"></i><br>Fetching asset records, opening secure streams...</div>`;
            
            try {
                let visId = localStorage.getItem("visitor_id");
                let res = await fetch(`${API_URL}?action=getPostDetail&id=${id}&visitor_id=${visId}`);
                let json = await res.json();
                if (!json.success) {
                    target.innerHTML = `<div class="p-8 text-red-500 text-center">${json.error}</div>`;
                    return;
                }
                
                let p = json.data;
                
                // Save locally to mark instantly as watched dynamically inside current browser state context
                let watchedRegistry = JSON.parse(localStorage.getItem("watched_registry") || "[]");
                if(!watchedRegistry.includes(p.id)) {
                    watchedRegistry.push(p.id);
                    localStorage.setItem("watched_registry", JSON.stringify(watchedRegistry));
                }

                let badgeClass = "badge-normal";
                if(p.refresh_level === "Titanium") badgeClass = "badge-titanium";
                if(p.refresh_level === "Super Hot") badgeClass = "badge-superhot";
                if(p.refresh_level === "Hot") badgeClass = "badge-hot";

                target.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 space-y-6">
                            <div class="bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-xs relative">
                                <div class="flex flex-wrap items-center gap-3 mb-4">
                                    <span class="text-[10px] font-black tracking-widest px-2.5 py-1 rounded-sm ${badgeClass}">
                                        ${p.refresh_level.toUpperCase()}
                                    </span>
                                    <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-2.5 py-1 rounded">
                                        ${p.purpose.toUpperCase()}
                                    </span>
                                    <span class="bg-slate-100 text-slate-700 text-xs font-bold px-2.5 py-1 rounded">
                                        ${p.property_type.toUpperCase()}
                                    </span>
                                    <span class="ml-auto flex items-center gap-1.5 text-xs font-bold text-slate-500 bg-slate-50 border border-slate-200 px-2.5 py-1 rounded">
                                        <i class="fa-solid fa-eye text-slate-400"></i> ${p.total_views} VIEWS
                                    </span>
                                </div>
                                <h1 class="text-2xl md:text-4xl font-black text-slate-900 tracking-tight leading-tight mb-2">${p.title}</h1>
                                <p class="text-slate-500 text-sm flex items-center gap-1.5 mb-6"><i class="fa-solid fa-location-dot text-indigo-500"></i> ${p.location_detail}, ${p.location}</p>
                                
                                <div class="grid grid-cols-3 gap-4 border-y border-slate-100 py-4 my-6 text-center">
                                    <div>
                                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Covered Area</div>
                                        <div class="text-base font-black text-slate-800">${p.area} ${p.area_unit}</div>
                                    </div>
                                    <div>
                                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Bedrooms</div>
                                        <div class="text-base font-black text-slate-800">${p.bedrooms || 'N/A'}</div>
                                    </div>
                                    <div>
                                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Bathrooms</div>
                                        <div class="text-base font-black text-slate-800">${p.bathrooms || 'N/A'}</div>
                                    </div>
                                </div>

                                <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider mb-3">Structural Description</h3>
                                <p class="text-slate-600 text-sm whitespace-pre-line leading-relaxed">${p.description}</p>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-xs">
                                <div class="text-center pb-6 border-b border-slate-100">
                                    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 text-2xl font-bold mx-auto mb-3 border border-slate-200">
                                        ${p.agent_name ? p.agent_name.charAt(0).toUpperCase() : 'A'}
                                    </div>
                                    <h3 class="text-lg font-bold text-slate-900 tracking-tight">${p.agent_name}</h3>
                                    <p class="text-xs font-semibold text-indigo-600 mb-1">${p.agency_name || 'Independent Specialist'}</p>
                                </div>
                                <div class="py-6 space-y-4">
                                    <div>
                                        <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Financial Obligation</span>
                                        <div class="text-3xl font-black text-slate-900 tracking-tight">PKR ${Number(p.price).toLocaleString()}</div>
                                    </div>
                                    <a href="https://wa.me/${p.contact_number.replace(/[^0-9]/g, '')}?text=Aslam-o-Alaikum,%20I%20am%20interested%20in%20your%20listing:%20${encodeURIComponent(p.title)}%20on%20NJK%20Property%20Magazine." target="_blank" 
                                       class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg py-3 px-4 flex items-center justify-center gap-2 text-sm transition shadow-sm">
                                        <i class="fa-brands fa-whatsapp text-lg"></i> Contact via WhatsApp
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch(e) {
                target.innerHTML = `<div class="p-8 text-red-500 text-center">Runtime trace exception mapping catalog asset.</div>`;
            }
        }

        // ==========================================
        // AGENT OPERATIONS DASHBOARD MANAGEMENT
        // ==========================================

        async function renderAgentDashboard(target) {
            target.innerHTML = `<div class="p-12 text-center text-slate-500 font-medium"><i class="fa-solid fa-circle-notch animate-spin text-indigo-600 text-3xl mb-4"></i><br>Syncing user operational profiles...</div>`;
            
            try {
                let res = await fetch(`${API_URL}?action=dashboard&token=${encodeURIComponent(state.token)}`);
                let json = await res.json();
                if (!json.success) { 
                    alert("Dashboard Access Error: " + (json.error || "Deactivated Session"));
                    forceLogout(); 
                    return; 
                }
                
                let ov = json.overview;
                let posts = json.posts;
                
                target.innerHTML = `
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
                        <div>
                            <h1 class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight">Agent Console Workspace</h1>
                            <p class="text-slate-500 text-sm">Monitor visibility allocations, pipeline logs, and manage listings.</p>
                        </div>
                        <button onclick="navigateTo('postForm', {post: null})" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2.5 px-5 rounded-lg shadow-sm transition flex items-center gap-1.5">
                            <i class="fa-solid fa-plus"></i> Launch New Listing
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white border border-slate-200 p-6 rounded-xl shadow-xs">

                let json = await res.json();

                    navigateTo("dashboard");

            } catch(err) { alert("Execution network timeout failure."); }

                if(json.success) { navigateTo("dashboard"); }

        function triggerRefreshModal(id) {
            let level = prompt("Select Visibility Boost Tier:\n- Titanium (Costs 10 units, 30 days)\n- Super Hot (Costs 7 units, 30 days)\n- Hot (Costs 5 units, 30 days)\n- Normal (Costs 1 unit, 24 hours)", "Normal");
            if(!level) return;
            
            // Standardizing strings capitalization safely
            let formatted = level.trim().replace(/\b\w/g, c => c.toUpperCase());
            if(!["Titanium", "Super Hot", "Hot", "Normal"].includes(formatted)) {
                alert("Validation Fault: Selected parameter does not align with core structural metrics.");
                return;
            }
            
            fetch(`${API_URL}?action=refreshPost&token=${encodeURIComponent(state.token)}`, {
                method: "POST",
                body: JSON.stringify({ id, level: formatted })
            }).then(r => r.json()).then(json => {
                if(json.success) { alert("Structural matrix boosted successfully."); navigateTo("dashboard"); }
                else { alert(json.error); }
            }).catch(() => alert("Pipeline refresh link anomaly detected."));

        async function executeSubmitPost(e, editId) {
            e.preventDefault();
            let payload = {

                property_type: document.getElementById("f-type").value,
                purpose: document.getElementById("f-purpose").value,
                price: parseFloat(document.getElementById("f-price").value),
                area: parseFloat(document.getElementById("f-area").value),
                area_unit: document.getElementById("f-unit").value,
                location: document.getElementById("f-loc").value,

                bathrooms: parseInt(document.getElementById("f-baths").value || 0, 10),
                location_detail: document.getElementById("f-loc-det").value,
                agency_name: document.getElementById("f-agency").value,
                contact_number: document.getElementById("f-phone").value,
                description: document.getElementById("f-desc").value,
                token: state.token
            };

            let actionTarget = "posts";
            if(editId) {
                payload.id = editId;
                payload._method = "PUT";
            }

            try {
                let res = await fetch(`${API_URL}?action=${actionTarget}`, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                let json = await res.json();
                if(json.success) {
                    alert("Asset structural record successfully verified and written to main table arrays.");
                    navigateTo("dashboard");
                } else { alert("Operational Failure: " + json.error); }
            } catch(err) { alert("Core pipeline processing lock failure."); }
        }

                                            <th class="px-6 py-3">Security Role</th>
                                            <th class="px-6 py-3">Quota Limits Status</th>
                                            <th class="px-6 py-3">Live State</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                                        ${users.data.map(u => `
                                            <tr>
                                                <td class="px-6 py-4 font-mono font-bold text-xs">${u.id}</td>
                                                <td class="px-6 py-4">
                                                    <div class="font-bold text-slate-900">${u.name}</div>
                                                    <div class="text-xs text-slate-400">${u.email}</div>
                                                </td>
                                                <td class="px-6 py-4 font-semibold text-slate-800 uppercase text-xs tracking-wider">${u.role}</td>
                                                <td class="px-6 py-4 font-medium text-slate-700">Posts: ${u.assigned_post_quota} | Boosts: ${u.assigned_refresh_quota}</td>
                                                <td class="px-6 py-4">
                                                    <span class="text-xs font-bold px-2 py-0.5 rounded ${u.active === true || u.active === 'TRUE' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-700 border border-red-200'}">
                                                        ${u.active === true || u.active === 'TRUE' ? 'ACTIVE' : 'DEACTIVATED'}
                                                    </span>
                                                </td>
                                            </tr>
                                        `).join("")}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            } catch(e) { target.innerHTML = `<div class="p-8 text-red-500 text-center">Root administrative visualization compilation fault.</div>`; }
        }

        async function processAdminQuota(id, status) {
            let note = prompt("Attach operational processing signature administrative note:");
            try {
                let res = await fetch(`${API_URL}?action=adminProcessQuota&token=${encodeURIComponent(state.token)}`, {
                    method: "POST",
                    body: JSON.stringify({ id, status, admin_note: note })
                });
                let json = await res.json();
                if(json.success) { navigateTo("dashboard"); }
            } catch(e) { alert("Core database connection error."); }
        }

        async function processAdminDeal(id, status) {
            let note = prompt("Attach transactional balance verification note:");
            try {
                let res = await fetch(`${API_URL}?action=adminProcessDeal&token=${encodeURIComponent(state.token)}`, {
                    method: "POST",
                    body: JSON.stringify({ id, status, admin_note: note })
                });
                let json = await res.json();
                if(json.success) { navigateTo("dashboard"); }
            } catch(e) { alert("Core connection trace fault."); }
        }

        function triggerManualQuotaAssignment() {
            let user_id = prompt("Provide target operational User unique identity tracking ID (e.g., USR-00001):");
            if(!user_id) return;
            let assigned_post_quota = prompt("Set total maximum post allocation value:", "5");
            let assigned_refresh_quota = prompt("Set total visibility refresh pool balance:", "20");
            
            fetch(`${API_URL}?action=adminManualQuota&token=${encodeURIComponent(state.token)}`, {
                method: "POST",
                body: JSON.stringify({ user_id, assigned_post_quota, assigned_refresh_quota })
            }).then(r=>r.json()).then(json => {
                if(json.success) { alert("User permission records modified."); navigateTo("dashboard"); }
                else { alert(json.error); }
            }).catch(() => alert("Terminal override tracking timeout error."));
        }
    </script>
</body>
</html>
